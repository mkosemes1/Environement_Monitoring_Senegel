# ══════════════════════════════════════════════════════════════════════════════
#  Dakar Environmental Monitoring Pipeline — Docker Compose
#  Services : ZooKeeper · 3× Kafka (HA) · MinIO · Producer · StorageWorker
#             · Dashboard (Streamlit) · JupyterLab
# ══════════════════════════════════════════════════════════════════════════════

networks:
  dakar-net:
    driver: bridge

volumes:
  minio-data:
  zookeeper-data:
  zookeeper-logs:
  kafka1-data:
  kafka2-data:
  kafka3-data:

services:

  # ── ZooKeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    networks: [dakar-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka Broker 1 ─────────────────────────────────────────────────────────
  kafka1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka1
    restart: unless-stopped
    networks: [dakar-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka1-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka Broker 2 ─────────────────────────────────────────────────────────
  kafka2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka2
    restart: unless-stopped
    networks: [dakar-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka2-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9093", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka Broker 3 ─────────────────────────────────────────────────────────
  kafka3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka3
    restart: unless-stopped
    networks: [dakar-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka3-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9094", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO (Data Lake S3-compatible) ────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: minio
    restart: unless-stopped
    networks: [dakar-net]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Producer Python ────────────────────────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile.producer
    container_name: producer
    restart: unless-stopped
    networks: [dakar-net]
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      OWM_API_KEY: ${OWM_API_KEY}

  # ── Storage Worker (Kafka → MinIO Parquet) ─────────────────────────────────
  storage-worker:
    build:
      context: ./producer
      dockerfile: Dockerfile.worker
    container_name: storage-worker
    restart: unless-stopped
    networks: [dakar-net]
    depends_on:
      kafka1:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"

  # ── Streamlit Dashboard (consumer) ────────────────────────────────────────
  dashboard:
    build:
      context: ./consumer
      dockerfile: Dockerfile.dashboard
    container_name: dashboard
    restart: unless-stopped
    networks: [dakar-net]
    depends_on:
      kafka1:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    environment:
      PYTHONUNBUFFERED: "1"

  # ── JupyterLab ─────────────────────────────────────────────────────────────
  jupyterlab:
    image: jupyter/scipy-notebook:python-3.11
    container_name: jupyterlab
    restart: unless-stopped
    networks: [dakar-net]
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      PYTHONUNBUFFERED: "1"
      NB_UID: 1000
      NB_GID: 1000
      CHOWN_HOME: "yes"
      CHOWN_HOME_OPTS: "-R"
    user: root
    volumes:
      - ./notebooks:/home/jovyan/work
    command: >
      bash -c "fix-permissions /home/jovyan/work &&
               start-notebook.sh
               --ServerApp.token='dakar2024'
               --ServerApp.password=''
               --ServerApp.allow_origin='*'
               --ServerApp.ip='0.0.0.0'
               --ServerApp.root_dir='/home/jovyan/work'"
